<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>留白 Liminal -- 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: oklch(0.75 0.10 55);
      --color-primary-hover: oklch(0.70 0.12 55);
      --color-primary-active: oklch(0.65 0.13 55);
      --color-primary-subtle: oklch(0.92 0.04 55);
      --color-primary-faint: oklch(0.96 0.02 55);
      --color-secondary: oklch(0.78 0.05 60);
      --color-accent: oklch(0.65 0.14 40);
      --color-accent-subtle: oklch(0.90 0.05 40);
      --color-lavender: oklch(0.68 0.08 300);
      --color-lavender-subtle: oklch(0.92 0.03 300);
      --color-sage: oklch(0.70 0.08 155);
      --color-sage-subtle: oklch(0.92 0.04 155);
      --color-success: oklch(0.72 0.10 155);
      --color-error: oklch(0.65 0.12 25);
      --color-error-subtle: oklch(0.92 0.05 25);
      --color-surface-0: oklch(0.98 0.008 55);
      --color-surface-1: oklch(0.96 0.010 55);
      --color-surface-2: oklch(0.93 0.012 55);
      --color-surface-3: oklch(0.89 0.015 55);
      --color-text-primary: oklch(0.25 0.025 55);
      --color-text-secondary: oklch(0.50 0.020 55);
      --color-text-tertiary: oklch(0.65 0.015 55);
      --color-text-on-primary: oklch(0.98 0.005 55);
      --color-border: oklch(0.88 0.012 55);
      --color-border-focus: oklch(0.75 0.10 55);

      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px; --space-20: 80px;

      --font-display: 'Playfair Display', Georgia, serif;
      --font-heading: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body: 'Figtree', system-ui, sans-serif;

      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem;
      --text-3xl: clamp(1.75rem, 1.5rem + 1vw, 2rem);
      --text-4xl: clamp(2rem, 1.5rem + 2vw, 2.75rem);

      --leading-tight: 1.15; --leading-snug: 1.3;
      --leading-normal: 1.5; --leading-relaxed: 1.7;

      --shadow-sm: 0 1px 2px oklch(0.25 0.02 55 / 0.04), 0 1px 3px oklch(0.25 0.02 55 / 0.06);
      --shadow-md: 0 2px 4px oklch(0.25 0.02 55 / 0.04), 0 4px 8px oklch(0.25 0.02 55 / 0.06), 0 8px 16px oklch(0.25 0.02 55 / 0.04);

      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-2xl: 24px; --radius-full: 9999px;

      --duration-fast: 200ms; --duration-normal: 300ms;
      --duration-slow: 500ms; --duration-entrance: 700ms;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out-sine: cubic-bezier(0.37, 0, 0.63, 1);
    }

    [data-theme="dark"] {
      --color-surface-0: oklch(0.18 0.020 40);
      --color-surface-1: oklch(0.22 0.018 45);
      --color-surface-2: oklch(0.26 0.016 50);
      --color-surface-3: oklch(0.30 0.014 50);
      --color-text-primary: oklch(0.90 0.010 55);
      --color-text-secondary: oklch(0.70 0.012 55);
      --color-text-tertiary: oklch(0.55 0.010 55);
      --color-border: oklch(0.32 0.015 50);
      --color-border-focus: oklch(0.65 0.10 55);
      --color-primary-subtle: oklch(0.30 0.06 55);
      --color-primary-faint: oklch(0.24 0.04 55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
      color: var(--color-text-primary);
      background: var(--color-surface-0);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; min-height: 100dvh;
      overflow: hidden;
    }

    /* --- State Switcher (Dev Preview Only) --- */
    .state-switcher {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: oklch(0.95 0.005 55); border-bottom: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-4);
      display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center;
      font-size: var(--text-xs); font-family: var(--font-heading);
    }
    .state-switcher span { color: var(--color-text-tertiary); margin-right: var(--space-2); }
    .state-btn {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: transparent; color: var(--color-text-secondary);
      cursor: pointer; font-size: var(--text-xs); font-family: var(--font-heading);
      transition: all var(--duration-fast) var(--ease-out-quart);
    }
    .state-btn:hover { background: var(--color-primary-faint); }
    .state-btn.active {
      background: var(--color-primary);
      color: var(--color-text-on-primary);
      border-color: var(--color-primary);
    }

    /* --- Main Layout --- */
    .auth-page {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: var(--space-8) var(--space-6);
      padding-top: 44px;
      position: relative; overflow: hidden;
    }

    /* --- Emotion Spectrum Background --- */
    .spectrum-bg {
      position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .spectrum-band {
      position: absolute;
      left: -20%; right: -20%; top: 35%; height: 300px;
      background: linear-gradient(90deg,
        transparent 0%,
        oklch(0.82 0.08 155 / 0.25) 15%,
        oklch(0.78 0.10 55 / 0.4) 35%,
        oklch(0.72 0.12 40 / 0.35) 50%,
        oklch(0.75 0.08 300 / 0.3) 70%,
        oklch(0.80 0.06 250 / 0.2) 85%,
        transparent 100%
      );
      filter: blur(80px);
      animation: spectrumBreathe 8s var(--ease-in-out-sine) infinite;
    }
    .spectrum-core {
      position: absolute;
      left: 10%; right: 10%; top: 40%; height: 100px;
      background: linear-gradient(90deg,
        transparent 0%,
        oklch(0.80 0.12 155 / 0.2) 10%,
        oklch(0.78 0.14 55 / 0.4) 30%,
        oklch(0.72 0.16 40 / 0.35) 50%,
        oklch(0.70 0.12 300 / 0.3) 70%,
        transparent 100%
      );
      filter: blur(40px);
      animation: spectrumBreathe 6s var(--ease-in-out-sine) infinite reverse;
    }
    @keyframes spectrumBreathe {
      0%, 100% { opacity: 1; transform: scaleX(1); }
      50% { opacity: 0.7; transform: scaleX(1.05); }
    }

    [data-theme="dark"] .spectrum-band {
      background: linear-gradient(90deg,
        transparent 0%,
        oklch(0.40 0.06 155 / 0.3) 15%,
        oklch(0.45 0.08 55 / 0.4) 35%,
        oklch(0.40 0.10 40 / 0.35) 50%,
        oklch(0.42 0.06 300 / 0.35) 70%,
        transparent 100%
      );
    }
    [data-theme="dark"] .spectrum-core {
      background: linear-gradient(90deg,
        transparent 0%,
        oklch(0.38 0.10 55 / 0.3) 30%,
        oklch(0.35 0.12 40 / 0.3) 50%,
        oklch(0.38 0.08 300 / 0.25) 70%,
        transparent 100%
      );
    }

    /* --- Brand Area --- */
    .brand-area {
      position: relative; z-index: 1;
      text-align: center; margin-bottom: var(--space-16);
    }
    .brand-logo {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--color-text-primary);
      margin-bottom: var(--space-2);
      opacity: 0; animation: fadeInUp 800ms var(--ease-out-expo) forwards;
    }
    .brand-sub {
      font-family: var(--font-heading);
      font-size: var(--text-sm);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-8);
      opacity: 0; animation: fadeInUp 800ms var(--ease-out-expo) 200ms forwards;
    }
    .brand-slogan {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text-secondary);
      max-width: 320px; margin: 0 auto;
      line-height: var(--leading-relaxed);
      opacity: 0; animation: fadeInUp 800ms var(--ease-out-expo) 400ms forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Form Area --- */
    .form-area {
      position: relative; z-index: 1;
      width: 100%; max-width: 360px;
      opacity: 0; animation: fadeInUp 800ms var(--ease-out-expo) 600ms forwards;
    }
    .form-group { margin-bottom: var(--space-5); position: relative; }

    .input-field {
      width: 100%; padding: var(--space-4) var(--space-5);
      font-family: var(--font-body); font-size: var(--text-base);
      color: var(--color-text-primary);
      background: var(--color-surface-1);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      outline: none;
      transition: all var(--duration-normal) var(--ease-out-quart);
    }
    .input-field::placeholder { color: var(--color-text-tertiary); }
    .input-field:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px oklch(0.75 0.10 55 / 0.12);
      background: var(--color-surface-0);
    }
    .input-field.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px oklch(0.65 0.12 25 / 0.1);
      animation: shake 300ms var(--ease-out-quart);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .input-hint {
      font-size: var(--text-xs); color: var(--color-error);
      margin-top: var(--space-2); padding-left: var(--space-4);
      display: none;
    }
    .input-hint.visible { display: block; animation: fadeInUp 200ms var(--ease-out-quart); }

    /* --- Verify Code Button --- */
    .verify-btn {
      position: absolute; right: var(--space-3); top: 50%;
      transform: translateY(-50%);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-heading); font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-primary); background: transparent;
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-quart);
    }
    .verify-btn:hover:not(:disabled) {
      background: var(--color-primary-faint);
    }
    .verify-btn:disabled {
      color: var(--color-text-tertiary);
      border-color: var(--color-border);
      cursor: not-allowed;
    }

    /* --- Code Input Group --- */
    .code-group {
      display: none; flex-direction: column; align-items: center;
      margin-bottom: var(--space-6);
    }
    .code-group.visible {
      display: flex;
      animation: fadeInUp 400ms var(--ease-out-expo);
    }
    .code-label {
      font-size: var(--text-sm); color: var(--color-text-secondary);
      margin-bottom: var(--space-4);
    }
    .code-inputs {
      display: flex; gap: var(--space-3); justify-content: center;
    }
    .code-input {
      width: 44px; height: 52px;
      text-align: center;
      font-family: var(--font-heading); font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-text-primary);
      background: var(--color-surface-1);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      outline: none;
      transition: all var(--duration-fast) var(--ease-out-quart);
    }
    .code-input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px oklch(0.75 0.10 55 / 0.12);
      background: var(--color-surface-0);
    }
    .code-input.error {
      border-color: var(--color-error);
      animation: shake 300ms var(--ease-out-quart);
    }
    .code-error {
      font-size: var(--text-xs); color: var(--color-error);
      margin-top: var(--space-3); display: none;
    }
    .code-error.visible { display: block; }

    /* --- Primary Button --- */
    .btn-primary {
      width: 100%; padding: var(--space-4);
      font-family: var(--font-heading); font-size: var(--text-base);
      font-weight: 600; letter-spacing: 0.02em;
      color: var(--color-text-on-primary);
      background: var(--color-primary);
      border: none; border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out-quart);
      position: relative; overflow: hidden;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .btn-primary:active:not(:disabled) {
      background: var(--color-primary-active);
      transform: translateY(0) scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }
    .btn-primary .spinner {
      display: none; width: 20px; height: 20px;
      border: 2px solid oklch(0.98 0.005 55 / 0.3);
      border-top-color: var(--color-text-on-primary);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Divider --- */
    .divider {
      display: flex; align-items: center; gap: var(--space-4);
      margin: var(--space-6) 0;
      color: var(--color-text-tertiary); font-size: var(--text-xs);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--color-border);
    }

    /* --- WeChat Button --- */
    .btn-wechat {
      width: 100%; padding: var(--space-4);
      font-family: var(--font-heading); font-size: var(--text-base);
      font-weight: 500;
      color: var(--color-text-secondary);
      background: var(--color-surface-1);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--space-3);
      transition: all var(--duration-fast) var(--ease-out-quart);
    }
    .btn-wechat:hover {
      background: var(--color-surface-2);
      border-color: var(--color-primary);
    }
    .btn-wechat svg { width: 20px; height: 20px; }

    /* --- Footer --- */
    .auth-footer {
      position: relative; z-index: 1;
      margin-top: var(--space-10);
      text-align: center;
    }
    .agreement {
      font-size: var(--text-xs); color: var(--color-text-tertiary);
      line-height: var(--leading-relaxed);
    }
    .agreement a {
      color: var(--color-primary);
      text-decoration: none;
    }
    .agreement a:hover { text-decoration: underline; }
    .safety-note {
      font-size: var(--text-xs); color: var(--color-text-tertiary);
      margin-top: var(--space-4);
      display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    }
    .safety-note svg { width: 14px; height: 14px; opacity: 0.6; }

    /* --- Toast --- */
    .toast {
      position: fixed; bottom: var(--space-10); left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: var(--space-3) var(--space-6);
      background: var(--color-surface-invert, oklch(0.22 0.020 55));
      color: var(--color-text-on-dark, oklch(0.92 0.010 55));
      border-radius: var(--radius-full);
      font-size: var(--text-sm); font-family: var(--font-body);
      box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none;
      transition: all var(--duration-normal) var(--ease-out-expo);
      z-index: 1000;
    }
    .toast.visible {
      opacity: 1; transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    /* --- Success Animation --- */
    .success-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: none; align-items: center; justify-content: center;
      background: var(--color-surface-0);
    }
    .success-overlay.visible { display: flex; animation: fadeIn 500ms var(--ease-out-expo); }
    .success-check {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--color-primary-subtle);
      display: flex; align-items: center; justify-content: center;
      animation: scaleIn 400ms var(--ease-out-expo) 200ms both;
    }
    .success-check svg { width: 32px; height: 32px; color: var(--color-primary); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* --- Responsive --- */
    @media (max-width: 375px) {
      .brand-logo { font-size: var(--text-3xl); }
      .code-input { width: 40px; height: 48px; font-size: var(--text-lg); }
      .code-inputs { gap: var(--space-2); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .spectrum-band, .spectrum-core { animation: none; }
    }
  </style>
</head>
<body>
  <!-- State Switcher (Dev Preview) -->
  <div class="state-switcher">
    <span>P03 Auth</span>
    <button class="state-btn active" onclick="showState('initial')">Initial</button>
    <button class="state-btn" onclick="showState('phone-input')">Phone Input</button>
    <button class="state-btn" onclick="showState('code-sent')">Code Sent</button>
    <button class="state-btn" onclick="showState('verifying')">Verifying</button>
    <button class="state-btn" onclick="showState('code-error')">Code Error</button>
    <button class="state-btn" onclick="showState('phone-error')">Phone Error</button>
    <button class="state-btn" onclick="showState('success')">Success</button>
    <button class="state-btn" onclick="toggleDarkMode()">Dark</button>
  </div>

  <div class="auth-page">
    <!-- Spectrum Background -->
    <div class="spectrum-bg">
      <div class="spectrum-band"></div>
      <div class="spectrum-core"></div>
    </div>

    <!-- Brand -->
    <div class="brand-area">
      <div class="brand-logo">留白</div>
      <div class="brand-sub">Liminal</div>
      <div class="brand-slogan">在两种状态之间，给情绪留出呼吸的空间</div>
    </div>

    <!-- Form -->
    <div class="form-area">
      <div class="form-group" id="phoneGroup">
        <input type="tel" class="input-field" id="phoneInput"
               placeholder="手机号" maxlength="11" autocomplete="tel"
               oninput="handlePhoneInput(this)">
        <button class="verify-btn" id="verifyBtn" disabled onclick="sendCode()">获取验证码</button>
        <div class="input-hint" id="phoneHint">请输入正确的手机号</div>
      </div>

      <div class="code-group" id="codeGroup">
        <div class="code-label">验证码已发送</div>
        <div class="code-inputs">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="0">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="1">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="2">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="3">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="4">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" data-index="5">
        </div>
        <div class="code-error" id="codeError">验证码不正确，请重试</div>
      </div>

      <button class="btn-primary" id="submitBtn" disabled onclick="handleSubmit()">
        <span class="btn-text">开始</span>
        <span class="spinner"></span>
      </button>

      <div class="divider">或</div>

      <button class="btn-wechat" onclick="handleWechat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8.5 10.5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm5 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
          <path d="M12 2C6.48 2 2 5.92 2 10.7c0 2.72 1.47 5.15 3.78 6.73l-.97 2.89 3.35-1.67c1.21.34 2.48.52 3.84.52 5.52 0 10-3.92 10-8.77S17.52 2 12 2z"/>
        </svg>
        微信登录
      </button>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      <div class="agreement">
        登录即同意 <a href="#" onclick="return false">《用户协议》</a> 和 <a href="#" onclick="return false">《隐私政策》</a>
      </div>
      <div class="safety-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        你的每一句话都会被加密保护，不会用于任何训练
      </div>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // --- State Management ---
    let countdown = 0;
    let countdownTimer = null;

    function showState(state) {
      document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      const phoneInput = document.getElementById('phoneInput');
      const phoneHint = document.getElementById('phoneHint');
      const verifyBtn = document.getElementById('verifyBtn');
      const codeGroup = document.getElementById('codeGroup');
      const codeInputs = document.querySelectorAll('.code-input');
      const codeError = document.getElementById('codeError');
      const submitBtn = document.getElementById('submitBtn');
      const successOverlay = document.getElementById('successOverlay');

      // Reset
      phoneInput.classList.remove('error');
      phoneHint.classList.remove('visible');
      codeGroup.classList.remove('visible');
      codeError.classList.remove('visible');
      codeInputs.forEach(i => { i.classList.remove('error'); i.value = ''; });
      submitBtn.classList.remove('loading');
      submitBtn.disabled = true;
      successOverlay.classList.remove('visible');
      verifyBtn.disabled = true;

      switch(state) {
        case 'initial':
          phoneInput.value = '';
          break;
        case 'phone-input':
          phoneInput.value = '138';
          phoneInput.focus();
          break;
        case 'code-sent':
          phoneInput.value = '13888888888';
          verifyBtn.textContent = '58s';
          verifyBtn.disabled = true;
          codeGroup.classList.add('visible');
          submitBtn.disabled = false;
          codeInputs[0].focus();
          break;
        case 'verifying':
          phoneInput.value = '13888888888';
          verifyBtn.textContent = '45s';
          verifyBtn.disabled = true;
          codeGroup.classList.add('visible');
          codeInputs.forEach((inp, i) => inp.value = '8');
          submitBtn.classList.add('loading');
          submitBtn.disabled = true;
          break;
        case 'code-error':
          phoneInput.value = '13888888888';
          verifyBtn.textContent = '30s';
          verifyBtn.disabled = true;
          codeGroup.classList.add('visible');
          codeInputs.forEach(i => { i.classList.add('error'); i.value = ''; });
          codeError.classList.add('visible');
          submitBtn.disabled = true;
          break;
        case 'phone-error':
          phoneInput.value = '123';
          phoneInput.classList.add('error');
          phoneHint.classList.add('visible');
          break;
        case 'success':
          successOverlay.classList.add('visible');
          break;
      }
    }

    function toggleDarkMode() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      event.target.textContent = isDark ? 'Dark' : 'Light';
      event.target.classList.toggle('active', !isDark);
    }

    // --- Phone Input ---
    function handlePhoneInput(el) {
      el.value = el.value.replace(/\D/g, '');
      const valid = /^1[3-9]\d{9}$/.test(el.value);
      document.getElementById('verifyBtn').disabled = !valid;
      el.classList.remove('error');
      document.getElementById('phoneHint').classList.remove('visible');

      if (el.value.length === 11 && !valid) {
        el.classList.add('error');
        document.getElementById('phoneHint').classList.add('visible');
      }
    }

    // --- Send Code ---
    function sendCode() {
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      countdown = 60;
      updateCountdown();

      document.getElementById('codeGroup').classList.add('visible');
      document.querySelector('.code-input[data-index="0"]').focus();
      document.getElementById('submitBtn').disabled = false;
    }

    function updateCountdown() {
      const btn = document.getElementById('verifyBtn');
      if (countdown > 0) {
        btn.textContent = countdown + 's';
        btn.disabled = true;
        countdown--;
        countdownTimer = setTimeout(updateCountdown, 1000);
      } else {
        btn.textContent = '重新发送';
        btn.disabled = false;
      }
    }

    // --- Code Inputs ---
    document.querySelectorAll('.code-input').forEach((input, idx, inputs) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        e.target.classList.remove('error');
        document.getElementById('codeError').classList.remove('visible');

        if (val && idx < 5) {
          inputs[idx + 1].focus();
        }

        // Auto-verify when all 6 filled
        const code = Array.from(inputs).map(i => i.value).join('');
        if (code.length === 6) {
          verifyCode(code);
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
          inputs[idx - 1].focus();
        }
      });
    });

    function verifyCode(code) {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      setTimeout(() => {
        if (code === '888888') {
          // Success
          document.getElementById('successOverlay').classList.add('visible');
          setTimeout(() => {
            showToast('Welcome! Redirecting...');
          }, 800);
        } else {
          // Error
          submitBtn.classList.remove('loading');
          submitBtn.disabled = false;
          document.querySelectorAll('.code-input').forEach(i => {
            i.classList.add('error');
            i.value = '';
          });
          document.getElementById('codeError').classList.add('visible');
          document.querySelector('.code-input[data-index="0"]').focus();
        }
      }, 1500);
    }

    function handleSubmit() {
      const code = Array.from(document.querySelectorAll('.code-input')).map(i => i.value).join('');
      if (code.length === 6) {
        verifyCode(code);
      }
    }

    function handleWechat() {
      showToast('微信授权中...');
      setTimeout(() => {
        document.getElementById('successOverlay').classList.add('visible');
      }, 1500);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 3000);
    }
  </script>
</body>
</html>
