<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>留白 Liminal -- 初次相遇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: oklch(0.75 0.10 55);
      --color-primary-hover: oklch(0.70 0.12 55);
      --color-primary-active: oklch(0.65 0.13 55);
      --color-primary-subtle: oklch(0.92 0.04 55);
      --color-primary-faint: oklch(0.96 0.02 55);
      --color-secondary: oklch(0.78 0.05 60);
      --color-accent: oklch(0.65 0.14 40);
      --color-lavender: oklch(0.68 0.08 300);
      --color-lavender-subtle: oklch(0.92 0.03 300);
      --color-sage: oklch(0.70 0.08 155);
      --color-surface-0: oklch(0.98 0.008 55);
      --color-surface-1: oklch(0.96 0.010 55);
      --color-surface-2: oklch(0.93 0.012 55);
      --color-text-primary: oklch(0.25 0.025 55);
      --color-text-secondary: oklch(0.50 0.020 55);
      --color-text-tertiary: oklch(0.65 0.015 55);
      --color-text-on-primary: oklch(0.98 0.005 55);
      --color-border: oklch(0.88 0.012 55);
      --color-border-focus: oklch(0.75 0.10 55);
      --color-error: oklch(0.65 0.12 25);

      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px;

      --font-display: 'Playfair Display', Georgia, serif;
      --font-heading: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body: 'Figtree', system-ui, sans-serif;

      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem;

      --leading-normal: 1.5; --leading-relaxed: 1.7;

      --shadow-sm: 0 1px 2px oklch(0.25 0.02 55 / 0.04), 0 1px 3px oklch(0.25 0.02 55 / 0.06);
      --shadow-md: 0 2px 4px oklch(0.25 0.02 55 / 0.04), 0 4px 8px oklch(0.25 0.02 55 / 0.06), 0 8px 16px oklch(0.25 0.02 55 / 0.04);

      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-2xl: 24px; --radius-full: 9999px;

      --duration-fast: 200ms; --duration-normal: 300ms; --duration-slow: 500ms;
      --duration-entrance: 700ms;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --color-surface-0: oklch(0.18 0.020 40);
      --color-surface-1: oklch(0.22 0.018 45);
      --color-surface-2: oklch(0.26 0.016 50);
      --color-text-primary: oklch(0.90 0.010 55);
      --color-text-secondary: oklch(0.70 0.012 55);
      --color-text-tertiary: oklch(0.55 0.010 55);
      --color-border: oklch(0.32 0.015 50);
      --color-border-focus: oklch(0.65 0.10 55);
      --color-primary-subtle: oklch(0.30 0.06 55);
      --color-primary-faint: oklch(0.24 0.04 55);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--color-text-primary);
      background: var(--color-surface-0);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; min-height: 100dvh;
      overflow: hidden;
    }

    /* State Switcher */
    .state-switcher {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: oklch(0.95 0.005 55); border-bottom: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-4);
      display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center;
      font-size: var(--text-xs); font-family: var(--font-heading);
    }
    .state-switcher span { color: var(--color-text-tertiary); margin-right: var(--space-2); }
    .state-btn {
      padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
      border: 1px solid var(--color-border); background: transparent;
      color: var(--color-text-secondary); cursor: pointer;
      font-size: var(--text-xs); font-family: var(--font-heading);
      transition: all var(--duration-fast) var(--ease-out-quart);
    }
    .state-btn:hover { background: var(--color-primary-faint); }
    .state-btn.active { background: var(--color-primary); color: var(--color-text-on-primary); border-color: var(--color-primary); }

    /* Onboarding Page */
    .onboarding-page {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      padding-top: 44px;
    }

    /* Progress Bar */
    .progress-bar {
      position: fixed; top: 44px; left: 0; right: 0;
      height: 2px; background: var(--color-surface-2); z-index: 10;
    }
    .progress-fill {
      height: 100%; background: var(--color-primary);
      transition: width var(--duration-slow) var(--ease-out-quart);
      width: 20%;
    }

    /* Conversation Area */
    .conversation {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: var(--space-12) var(--space-6);
      max-width: 480px; margin: 0 auto; width: 100%;
    }

    /* Messages Container */
    .messages {
      width: 100%; margin-bottom: var(--space-10);
    }

    /* AI Message */
    .ai-msg {
      font-family: var(--font-body);
      font-size: var(--text-lg);
      line-height: var(--leading-relaxed);
      color: var(--color-text-primary);
      margin-bottom: var(--space-8);
      white-space: pre-line;
    }
    .ai-msg .char {
      opacity: 0; display: inline;
      animation: charFadeIn 100ms var(--ease-out-quart) forwards;
    }
    @keyframes charFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Past messages (greyed out) */
    .past-msg {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--color-surface-2);
    }
    .past-msg .label { font-weight: 500; color: var(--color-text-secondary); font-size: var(--text-xs); margin-bottom: var(--space-1); }

    /* User reply display */
    .user-reply {
      display: inline-block;
      padding: var(--space-2) var(--space-4);
      background: var(--color-primary-faint);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: 500;
      margin-top: var(--space-2);
    }

    /* Input Area */
    .input-area {
      width: 100%; max-width: 480px;
    }
    .text-input-wrap {
      display: none; width: 100%;
    }
    .text-input-wrap.visible { display: flex; gap: var(--space-3); align-items: center; }
    .text-input {
      flex: 1; padding: var(--space-4) var(--space-5);
      font-family: var(--font-body); font-size: var(--text-base);
      color: var(--color-text-primary); background: var(--color-surface-1);
      border: 1.5px solid var(--color-border); border-radius: var(--radius-full);
      outline: none;
      transition: all var(--duration-normal) var(--ease-out-quart);
    }
    .text-input:focus { border-color: var(--color-border-focus); box-shadow: 0 0 0 3px oklch(0.75 0.10 55 / 0.12); }
    .text-input::placeholder { color: var(--color-text-tertiary); }

    .confirm-btn {
      padding: var(--space-3) var(--space-5);
      font-family: var(--font-heading); font-size: var(--text-sm); font-weight: 600;
      color: var(--color-text-on-primary); background: var(--color-primary);
      border: none; border-radius: var(--radius-full); cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out-quart);
      white-space: nowrap;
    }
    .confirm-btn:hover { background: var(--color-primary-hover); transform: translateY(-1px); }
    .confirm-btn:active { background: var(--color-primary-active); transform: scale(0.97); }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Choice Cards */
    .choices {
      display: none; flex-direction: column; gap: var(--space-3); width: 100%;
    }
    .choices.visible { display: flex; animation: fadeInUp 400ms var(--ease-out-expo); }
    .choice-card {
      padding: var(--space-5) var(--space-6);
      background: var(--color-surface-1);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out-quart);
      display: flex; align-items: center; gap: var(--space-4);
    }
    .choice-card:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-faint);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .choice-card.selected {
      border-color: var(--color-primary);
      background: var(--color-primary-subtle);
      transform: scale(1.02);
    }
    .choice-card.fading { opacity: 0.3; transform: scale(0.97); pointer-events: none; }
    .choice-icon {
      width: 40px; height: 40px; border-radius: var(--radius-lg);
      background: var(--color-primary-faint);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xl); flex-shrink: 0;
    }
    .choice-label { font-weight: 600; font-family: var(--font-heading); color: var(--color-text-primary); }
    .choice-desc { font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: var(--space-1); }

    /* Final Button */
    .final-btn {
      display: none; width: 100%; max-width: 320px;
      padding: var(--space-4) var(--space-8);
      margin: var(--space-8) auto 0;
      font-family: var(--font-heading); font-size: var(--text-base); font-weight: 600;
      color: var(--color-text-on-primary); background: var(--color-primary);
      border: none; border-radius: var(--radius-full); cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out-quart);
    }
    .final-btn.visible { display: block; animation: fadeInUp 600ms var(--ease-out-expo); }
    .final-btn:hover { background: var(--color-primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .final-btn:active { background: var(--color-primary-active); transform: scale(0.98); }

    /* Skip Link */
    .skip-link {
      position: fixed; bottom: var(--space-8); left: 0; right: 0;
      text-align: center;
      font-size: var(--text-sm); color: var(--color-text-tertiary);
      cursor: pointer; font-family: var(--font-body);
      transition: color var(--duration-fast) var(--ease-out-quart);
    }
    .skip-link:hover { color: var(--color-text-secondary); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 375px) {
      .conversation { padding: var(--space-8) var(--space-5); }
      .ai-msg { font-size: var(--text-base); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="state-switcher">
    <span>P04 Onboarding</span>
    <button class="state-btn active" onclick="jumpToStep(1)">Step 1</button>
    <button class="state-btn" onclick="jumpToStep(2)">Step 2</button>
    <button class="state-btn" onclick="jumpToStep(3)">Step 3</button>
    <button class="state-btn" onclick="jumpToStep(4)">Step 4</button>
    <button class="state-btn" onclick="jumpToStep(5)">Step 5</button>
    <button class="state-btn" onclick="toggleDarkMode()">Dark</button>
  </div>

  <div class="onboarding-page">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="conversation">
      <div class="messages" id="messages"></div>
      <div class="input-area" id="inputArea"></div>
    </div>

    <div class="skip-link" id="skipLink" onclick="handleSkip()">暂时不想聊，先看看</div>
  </div>

  <script>
    const steps = [
      {
        step: 1,
        aiText: "你好，这里是留白。\n你可以叫我任何你喜欢的名字，或者不叫也行。",
        inputType: "text",
        placeholder: "你想怎么称呼你的留白？",
        defaultValue: "留白"
      },
      {
        step: 2,
        aiText: "好的，留白就留白。\n那你希望我怎么叫你呢？",
        inputType: "text",
        placeholder: "你的名字或昵称",
        defaultValue: "阿栗"
      },
      {
        step: 3,
        aiText: "阿栗，好名字。\n每个人需要的陪伴方式不一样。你觉得哪种更像你想要的？",
        inputType: "choice",
        choices: [
          { id: "quiet", label: "安静陪伴", desc: "少说多听，你说我就在", icon: "\u{1F319}" },
          { id: "warm", label: "温暖共情", desc: "说出你说不出的感受", icon: "\u{1F9E1}" },
          { id: "rational", label: "理性梳理", desc: "帮你理清楚到底怎么了", icon: "\u{1F9ED}" }
        ]
      },
      {
        step: 4,
        aiText: "温暖共情型，记下了。\n你一般什么时候最想找人聊聊？",
        inputType: "choice",
        choices: [
          { id: "latenight", label: "深夜睡不着的时候", icon: "\u{2B50}" },
          { id: "commute", label: "通勤路上", icon: "\u{1F689}" },
          { id: "afterwork", label: "下班回家后", icon: "\u{1F3E0}" },
          { id: "anytime", label: "随时都有可能", icon: "\u{23F0}" }
        ]
      },
      {
        step: 5,
        aiText: "我记住了——\n你喜欢被叫阿栗，\n比起给建议你更希望有人听你说。\n\n以后我就在这里。",
        inputType: "final",
        buttonText: "开始对话"
      }
    ];

    let currentStep = 0;
    let userInputs = {};
    let isAnimating = false;

    function init() {
      renderStep(0);
    }

    function renderStep(idx) {
      if (isAnimating) return;
      isAnimating = true;
      currentStep = idx;

      const step = steps[idx];
      const messagesEl = document.getElementById('messages');
      const inputArea = document.getElementById('inputArea');

      // Update progress
      document.getElementById('progressFill').style.width = ((idx + 1) / steps.length * 100) + '%';

      // Hide skip on last step
      document.getElementById('skipLink').style.display = idx === 4 ? 'none' : 'block';

      // Clear input area
      inputArea.innerHTML = '';

      // Typewriter effect for AI text
      const aiMsgEl = document.createElement('div');
      aiMsgEl.className = 'ai-msg';
      aiMsgEl.id = 'currentAiMsg';
      messagesEl.appendChild(aiMsgEl);

      typeText(aiMsgEl, step.aiText, () => {
        // After typing, show input
        setTimeout(() => {
          renderInput(step, inputArea);
          isAnimating = false;
        }, 300);
      });
    }

    function typeText(el, text, callback) {
      el.innerHTML = '';
      let i = 0;
      const chars = text.split('');

      function typeChar() {
        if (i < chars.length) {
          const char = chars[i];
          if (char === '\n') {
            el.innerHTML += '<br>';
          } else {
            const span = document.createElement('span');
            span.className = 'char';
            span.style.animationDelay = '0ms';
            span.textContent = char;
            el.appendChild(span);
          }
          i++;
          setTimeout(typeChar, 50);
        } else {
          if (callback) callback();
        }
      }
      typeChar();
    }

    function renderInput(step, container) {
      if (step.inputType === 'text') {
        const wrap = document.createElement('div');
        wrap.className = 'text-input-wrap visible';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'text-input';
        input.placeholder = step.placeholder;
        input.id = 'stepInput';

        const btn = document.createElement('button');
        btn.className = 'confirm-btn';
        btn.textContent = '好的';
        btn.disabled = true;
        btn.onclick = () => confirmText(input.value);

        input.oninput = () => { btn.disabled = !input.value.trim(); };
        input.onkeydown = (e) => { if (e.key === 'Enter' && input.value.trim()) confirmText(input.value); };

        wrap.appendChild(input);
        wrap.appendChild(btn);
        container.appendChild(wrap);
        setTimeout(() => input.focus(), 100);

      } else if (step.inputType === 'choice') {
        const choices = document.createElement('div');
        choices.className = 'choices visible';

        step.choices.forEach(c => {
          const card = document.createElement('div');
          card.className = 'choice-card';
          card.onclick = () => selectChoice(card, c, choices);

          const icon = document.createElement('div');
          icon.className = 'choice-icon';
          icon.textContent = c.icon;

          const textWrap = document.createElement('div');
          const label = document.createElement('div');
          label.className = 'choice-label';
          label.textContent = c.label;
          textWrap.appendChild(label);

          if (c.desc) {
            const desc = document.createElement('div');
            desc.className = 'choice-desc';
            desc.textContent = c.desc;
            textWrap.appendChild(desc);
          }

          card.appendChild(icon);
          card.appendChild(textWrap);
          choices.appendChild(card);
        });

        container.appendChild(choices);

      } else if (step.inputType === 'final') {
        const btn = document.createElement('button');
        btn.className = 'final-btn visible';
        btn.textContent = step.buttonText;
        btn.onclick = handleComplete;
        container.appendChild(btn);
      }
    }

    function confirmText(value) {
      userInputs[currentStep] = value;

      // Show user reply and move to past
      const messagesEl = document.getElementById('messages');
      const currentAi = document.getElementById('currentAiMsg');
      if (currentAi) {
        currentAi.removeAttribute('id');
        const pastWrap = document.createElement('div');
        pastWrap.className = 'past-msg';
        pastWrap.innerHTML = currentAi.innerHTML;
        const reply = document.createElement('div');
        reply.className = 'user-reply';
        reply.textContent = value;
        pastWrap.appendChild(reply);

        messagesEl.removeChild(currentAi);
        messagesEl.appendChild(pastWrap);
      }

      document.getElementById('inputArea').innerHTML = '';
      setTimeout(() => renderStep(currentStep + 1), 500);
    }

    function selectChoice(card, choice, container) {
      card.classList.add('selected');
      container.querySelectorAll('.choice-card').forEach(c => {
        if (c !== card) c.classList.add('fading');
      });

      userInputs[currentStep] = choice.label;

      // Move to past
      setTimeout(() => {
        const messagesEl = document.getElementById('messages');
        const currentAi = document.getElementById('currentAiMsg');
        if (currentAi) {
          currentAi.removeAttribute('id');
          const pastWrap = document.createElement('div');
          pastWrap.className = 'past-msg';
          pastWrap.innerHTML = currentAi.innerHTML;
          const reply = document.createElement('div');
          reply.className = 'user-reply';
          reply.textContent = choice.label;
          pastWrap.appendChild(reply);

          messagesEl.removeChild(currentAi);
          messagesEl.appendChild(pastWrap);
        }

        document.getElementById('inputArea').innerHTML = '';
        setTimeout(() => renderStep(currentStep + 1), 300);
      }, 500);
    }

    function handleComplete() {
      alert('Redirecting to chat page (P01-chat.html)');
    }

    function handleSkip() {
      if (confirm('之后可以在设置里重新设置哦')) {
        alert('Redirecting to chat page with defaults');
      }
    }

    function jumpToStep(num) {
      document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      // Reset
      document.getElementById('messages').innerHTML = '';
      document.getElementById('inputArea').innerHTML = '';
      isAnimating = false;

      // Render previous steps as past
      for (let i = 0; i < num - 1; i++) {
        const pastWrap = document.createElement('div');
        pastWrap.className = 'past-msg';
        pastWrap.textContent = steps[i].aiText.replace(/\n/g, ' ');
        const reply = document.createElement('div');
        reply.className = 'user-reply';
        reply.textContent = i === 0 ? '留白' : i === 1 ? '阿栗' : i === 2 ? '温暖共情' : '深夜睡不着的时候';
        pastWrap.appendChild(reply);
        document.getElementById('messages').appendChild(pastWrap);
      }

      renderStep(num - 1);
    }

    function toggleDarkMode() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      event.target.textContent = isDark ? 'Dark' : 'Light';
      event.target.classList.toggle('active', !isDark);
    }

    init();
  </script>
</body>
</html>
