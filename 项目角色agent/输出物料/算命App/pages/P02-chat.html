<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>天机神算 - 解析中...</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-obsidian:          oklch(0.12 0.01 260); 
  --glow-gold:            oklch(0.85 0.16 85);
  --glow-gold-dim:        oklch(0.70 0.14 80);
  --text-pure:            oklch(0.98 0.01 260);
  --text-dim:             oklch(0.75 0.02 260);
  --glass-bg:             oklch(0.18 0.02 260 / 0.55);
  --glass-border:         oklch(0.98 0.01 260 / 0.12);
  --shadow-glass:         0 8px 24px oklch(0 0 0 / 0.3);
  --ease-elastic:         cubic-bezier(0.16, 1, 0.3, 1);
  --radius-full:          9999px;
  --font-display:         'ZCOOL XiaoWei', serif;
  --font-body:            'Noto Sans SC', sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-color: var(--bg-obsidian);
  color: var(--text-pure);
  font-family: var(--font-body);
  font-size: 16px;
  overflow: hidden; /* We will use internal scroll container */
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ============================================================
   BACKGROUND
   ============================================================ */
.ambient-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background: radial-gradient(circle at 50% 0%, oklch(0.2 0.05 280) 0%, transparent 60%);
  opacity: 0.8;
  pointer-events: none;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  position: relative;
  z-index: 10;
  height: 64px;
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: oklch(0.12 0.01 260 / 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
}

.header-btn {
  background: none; border: none; color: var(--glow-gold);
  padding: 8px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

.header-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  color: var(--glow-gold);
}

/* ============================================================
   CHAT AREA
   ============================================================ */
.chat-container {
  flex: 1;
  position: relative;
  z-index: 1;
  overflow-y: auto;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
  padding-bottom: 120px; /* space for input */
}

/* Custom scrollbar for desktop */
.chat-container::-webkit-scrollbar { width: 6px; }
.chat-container::-webkit-scrollbar-thumb { background: oklch(1 1 1 / 0.1); border-radius: 10px; }

/* Message Bubble */
.msg-row {
  display: flex;
  width: 100%;
  animation: slideIn 0.8s var(--ease-elastic) forwards;
  opacity: 0;
  transform: translateY(20px);
}

@keyframes slideIn {
  to { opacity: 1; transform: translateY(0); }
}

.msg-row.user { justify-content: flex-end; }
.msg-row.ai { justify-content: flex-start; align-items: flex-end; gap: 8px;}

.ai-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--glow-gold), var(--glow-gold-dim));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px oklch(0.85 0.16 85 / 0.3);
  margin-bottom: 4px;
}
.ai-avatar svg { width: 18px; height: 18px; color: var(--bg-obsidian); }

.bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 20px;
  font-size: 0.95rem;
  line-height: 1.5;
  word-wrap: break-word;
  box-shadow: var(--shadow-glass);
}

/* User sent message */
.msg-row.user .bubble {
  background: var(--glow-gold);
  color: var(--bg-obsidian);
  border-radius: 20px 4px 20px 20px;
  font-weight: 500;
}

/* AI received message */
.msg-row.ai .bubble {
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 20px 20px 20px 4px;
  color: var(--text-pure);
}

.glow-txt { color: var(--glow-gold); font-weight: bold; }

/* Typing indicator */
.typing-indicator {
  display: flex; gap: 4px; padding: 8px 12px; height: 24px; align-items: center;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--glow-gold);
  animation: bounce 1.4s infinite ease-in-out both;
}
.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* ============================================================
   INPUT AREA (Sticky Glass Bottom)
   ============================================================ */
.bottom-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  background: linear-gradient(to top, var(--bg-obsidian) 70%, transparent);
  padding: 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  display: flex;
  gap: 12px;
}

.input-box {
  flex: 1;
  background: oklch(0 0 0 / 0.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  padding: 4px 16px;
  transition: border-color 0.4s var(--ease-elastic);
}

.input-box:focus-within {
  border-color: var(--glow-gold-dim);
  box-shadow: 0 0 12px oklch(0.85 0.16 85 / 0.1);
}

.input-box input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-pure);
  font-family: var(--font-body);
  font-size: 1rem;
  outline: none;
  min-height: 48px;
}
.input-box input::placeholder {
  color: var(--text-ghost);
}

.btn-send {
  width: 56px; height: 56px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--glow-gold), var(--glow-gold-dim));
  border: none;
  color: var(--bg-obsidian);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px oklch(0.85 0.16 85 / 0.3);
  cursor: pointer;
  transition: transform 0.4s var(--ease-elastic);
}

.btn-send:active { transform: scale(0.9); }
.btn-send svg { width: 24px; height: 24px; transform: translateX(-2px); }

/* Bazi Summary Card (Top floating) */
.bazi-summary {
  margin: 0 auto;
  background: oklch(0 0 0 / 0.3);
  border: 1px solid oklch(0.85 0.16 85 / 0.2);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  justify-content: space-around;
  font-family: var(--font-display);
  color: var(--glow-gold);
  font-size: 1.1rem;
  box-shadow: 0 0 20px oklch(0.85 0.16 85 / 0.05);
  margin-bottom: 24px;
}
.pillar { display: flex; flex-direction: column; align-items: center; }
.gan { font-weight: 700; color: var(--text-pure); margin-bottom: 4px; }
.zhi { font-weight: 400; color: var(--glow-gold-dim); }

</style>
</head>
<body>

  <div class="ambient-bg"></div>

  <header>
    <button class="header-btn" onclick="window.history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="header-title">天机测算</div>
    <div style="width:40px"></div>
  </header>

  <div class="chat-container" id="chatList">
    
    <div class="bazi-summary">
      <div class="pillar"><span class="gan">乙</span><span class="zhi">亥</span></div>
      <div class="pillar"><span class="gan">丙</span><span class="zhi">寅</span></div>
      <div class="pillar"><span class="gan">甲</span><span class="zhi">子</span></div>
      <div class="pillar"><span class="gan">甲</span><span class="zhi">子</span></div>
    </div>

    <!-- AI Greeting -->
    <div class="msg-row ai" style="animation-delay: 0.1s">
      <div class="ai-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      </div>
      <div class="bubble">
        命主您好，您的八字为<span class="glow-txt">乙亥 丙寅 甲子 甲子</span>。原局木火通明，水木相生。<br><br>请问您今日想测算<span class="glow-txt">事业、感情、还是财运</span>？可以直接告诉我您的困惑。
      </div>
    </div>

  </div>

  <div class="bottom-area">
    <div class="input-box">
      <input type="text" id="chatInput" placeholder="输入你想测算的事项..." onkeypress="handleKey(event)">
    </div>
    <button class="btn-send" onclick="sendMsg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <script>
    const chatList = document.getElementById('chatList');
    const chatInput = document.getElementById('chatInput');

    function handleKey(e) {
      if(e.key === 'Enter') sendMsg();
    }

    function sendMsg() {
      const text = chatInput.value.trim();
      if(!text) return;

      appendUserMsg(text);
      chatInput.value = '';

      // Force scroll to bottom
      setTimeout(() => chatList.scrollTo(0, chatList.scrollHeight), 100);

      // Demo: AI responds after a delay
      showTyping();
      setTimeout(removeTypingAndReply, 2000);
    }

    function appendUserMsg(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `<div class="bubble">${text}</div>`;
      chatList.appendChild(row);
    }

    let typingRow = null;
    function showTyping() {
      typingRow = document.createElement('div');
      typingRow.className = 'msg-row ai';
      typingRow.innerHTML = `
        <div class="ai-avatar">...</div>
        <div class="bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
      `;
      chatList.appendChild(typingRow);
      chatList.scrollTo(0, chatList.scrollHeight);
    }

    function removeTypingAndReply() {
      if(typingRow) {
        chatList.removeChild(typingRow);
        typingRow = null;
      }

      const row = document.createElement('div');
      row.className = 'msg-row ai';
      row.innerHTML = `
        <div class="ai-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>
        <div class="bubble">好的。从流年来看，今年行至<span class="glow-txt">丁酉</span>运，天干丁火透出，伤官见官，工作上可能会遇到一些人事变动或挑战。<br><br>但是子水生寅木，根基稳固。只要坚持，年底会有贵人相助，柳暗花明。<br><br>如果您想生成完整的运势报告，随时告诉我。 <br><br>
        <button style="margin-top:12px;width:100%;padding:10px;background:var(--glow-gold);color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;" onclick="window.location.href='P03-share.html'">获取完整运势法牌</button>
        </div>
      `;
      chatList.appendChild(row);
      chatList.scrollTo(0, chatList.scrollHeight);
    }

  </script>
</body>
</html>
