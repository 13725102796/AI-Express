<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>天机法牌 - 命理罗盘</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-obsidian:          oklch(0.12 0.01 260); 
  --glow-gold:            oklch(0.85 0.16 85);
  --glow-gold-dim:        oklch(0.70 0.14 80);
  --text-pure:            oklch(0.98 0.01 260);
  --glass-bg:             oklch(0.18 0.02 260 / 0.55);
  --glass-border:         oklch(0.98 0.01 260 / 0.12);
  --ease-elastic:         cubic-bezier(0.16, 1, 0.3, 1);
  --font-display:         'ZCOOL XiaoWei', serif;
  --font-body:            'Noto Sans SC', sans-serif;
}

*, *::after, *::before { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-obsidian);
  color: var(--text-pure);
  font-family: var(--font-body);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh;
  overflow: hidden;
}

/* ============================================================
   BACKGROUND
   ============================================================ */
.ambient-bg {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% 50%, oklch(0.2 0.02 260) 0%, oklch(0.1 0.01 260) 100%);
}

.particles {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background-image: radial-gradient(var(--glow-gold-dim) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.1;
  animation: bgDrift 20s linear infinite;
}

@keyframes bgDrift { from { transform: translateY(0); } to { transform: translateY(-40px); } }

/* ============================================================
   CARD CONTAINER
   ============================================================ */
.card-container {
  position: relative;
  z-index: 10;
  width: calc(100% - 48px);
  max-width: 400px;
  perspective: 1000px;
}

.share-card {
  width: 100%;
  aspect-ratio: 3 / 4.5;
  background: linear-gradient(145deg, oklch(0 0 0 / 0.6) 0%, oklch(0 0 0 / 0.8) 100%);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 60px oklch(0.85 0.16 85 / 0.15), 0 20px 40px oklch(0 0 0 / 0.6);
  display: flex; flex-direction: column; align-items: center;
  animation: cardEnter 1s var(--ease-elastic) forwards;
  transform: translateY(100vh) rotateX(20deg);
}

@keyframes cardEnter {
  to { transform: translateY(0) rotateX(0deg); }
}

/* Card Glow Overlay */
.share-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: radial-gradient(circle at 50% -20%, var(--glow-gold-dim) 0%, transparent 70%);
  opacity: 0.3; pointer-events: none;
}

/* The magic circle */
.magic-circle {
  position: absolute;
  top: 15%;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  border: 1px dashed var(--glow-gold-dim);
  display: flex; align-items: center; justify-content: center;
  animation: slowSpin 30s linear infinite;
  opacity: 0.5;
}
.magic-circle::after {
  content: ''; position: absolute; inset: 10px; border: 1px solid var(--glow-gold); border-radius: 50%;
}
@keyframes slowSpin { to { transform: rotate(360deg); } }

/* Header Info */
.card-user-info {
  position: relative; z-index: 2; margin-top: 32px;
  text-align: center;
}
.card-date {
  font-family: var(--font-display);
  font-size: 1.8rem;
  color: var(--glow-gold);
  letter-spacing: 0.2rem;
  margin-bottom: 8px;
  text-shadow: 0 0 12px var(--glow-gold);
}
.card-bazi {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--text-pure);
  opacity: 0.8;
  letter-spacing: 0.1rem;
}

/* Verdict */
.card-verdict {
  position: relative; z-index: 2; margin-top: auto; margin-bottom: auto;
  font-family: var(--font-display);
  font-size: 4rem;
  font-weight: 700;
  color: var(--text-pure);
  text-shadow: 0 0 32px var(--glow-gold);
  letter-spacing: 0.3rem;
  background: linear-gradient(180deg, #FFFFFF 0%, var(--glow-gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Details */
.card-details {
  position: relative; z-index: 2;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  width: 100%;
  padding: 24px;
  border-top: 1px solid var(--glass-border);
  text-align: center;
}
.card-desc {
  font-size: 0.9rem; line-height: 1.6; color: oklch(0.9 0 0);
  margin-bottom: 16px;
}
.card-qr-area {
  display: flex; justify-content: space-between; align-items: center;
}
.qr-text { font-size: 0.75rem; color: var(--glow-gold-dim); letter-spacing: 0.1em; font-family: var(--font-display); }
.qr-ph { width: 40px; height: 40px; background: var(--glow-gold); border-radius: 4px; opacity: 0.8; }

/* ============================================================
   ACTIONS
   ============================================================ */
.actions {
  margin-top: 32px;
  display: flex; gap: 16px; width: 100%; max-width: 400px;
  padding: 0 24px;
  position: relative; z-index: 10;
  animation: fadeIn 1s ease 1s both;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;}}

.btn {
  flex: 1; height: 48px; border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body); font-weight: 500; font-size: 1rem;
  cursor: pointer; border: none; transition: transform 0.2s;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: var(--glow-gold); color: oklch(0 0 0); box-shadow: 0 0 16px var(--glow-gold-dim);
}
.btn-secondary {
  background: var(--glass-bg); color: var(--glow-gold); border: 1px solid var(--glass-border);
}

</style>
</head>
<body>

  <div class="ambient-bg"></div>
  <div class="particles"></div>

  <div class="card-container">
    <div class="share-card" id="shareCard">
      <div class="magic-circle"></div>

      <div class="card-user-info">
        <div class="card-date">吉 时 已 到</div>
        <div class="card-bazi">乙亥・丙寅・甲子・甲子</div>
      </div>

      <div class="card-verdict">上上签</div>

      <div class="card-details">
        <div class="card-desc">
          木火通明，水木相生。<br>
          今年职场必有贵人相助，万事亨通。<br>
          耐心等待，柳暗花明。
        </div>
        <div class="card-qr-area">
          <div class="qr-text">- 扫 码 洞 察 天 机 -</div>
          <!-- Fake QR -->
          <div class="qr-ph">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="10" width="30" height="30" stroke="#000" stroke-width="5"/>
              <rect x="60" y="10" width="30" height="30" stroke="#000" stroke-width="5"/>
              <rect x="10" y="60" width="30" height="30" stroke="#000" stroke-width="5"/>
              <circle cx="25" cy="25" r="5" fill="#000"/>
              <circle cx="75" cy="25" r="5" fill="#000"/>
              <circle cx="25" cy="75" r="5" fill="#000"/>
              <rect x="60" y="60" width="10" height="10" fill="#000"/>
              <rect x="80" y="80" width="10" height="10" fill="#000"/>
              <rect x="60" y="80" width="10" height="10" fill="#000"/>
            </svg>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="window.location.href='P01-home.html'">重新测算</button>
    <button class="btn btn-primary" onclick="alert('已保存法牌到相册！')">保存法牌</button>
  </div>

</body>
</html>
