  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #1A73E8;
      --color-primary-hover: #1565C0;
      --color-primary-active: #0D47A1;
      --color-primary-light: #E8F0FE;
      --color-primary-50: #EFF6FF;
      --color-secondary: #5F6368;
      --color-secondary-light: #9AA0A6;
      --color-accent: #F59E0B;
      --color-accent-hover: #D97706;
      --color-accent-light: #FEF3C7;
      --color-accent-dark: #92400E;
      --color-success: #34A853;
      --color-success-light: #E6F4EA;
      --color-error: #EA4335;
      --color-error-light: #FCE8E6;
      --color-bg-primary: #F8FAFC;
      --color-bg-secondary: #FFFFFF;
      --color-bg-tertiary: #F1F5F9;
      --color-bg-hover: #EFF6FF;
      --color-text-primary: #1F2937;
      --color-text-secondary: #6B7280;
      --color-text-tertiary: #9CA3AF;
      --color-text-inverse: #FFFFFF;
      --color-border: #E5E7EB;
      --color-border-hover: #D1D5DB;
      --color-border-focus: #1A73E8;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px;
      --font-family-en: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-family-zh: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-family-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      --font-size-xs: 12px; --font-size-sm: 14px; --font-size-base: 16px;
      --font-size-lg: 18px; --font-size-xl: 20px; --font-size-2xl: 24px;
      --font-size-3xl: 30px; --font-size-4xl: 36px;
      --font-weight-regular: 400; --font-weight-medium: 500;
      --font-weight-semibold: 600; --font-weight-bold: 700;
      --line-height-tight: 1.25; --line-height-normal: 1.5; --line-height-relaxed: 1.625;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.03), 0 1px 3px 0 rgba(0,0,0,0.06);
      --shadow-md: 0 2px 4px -1px rgba(0,0,0,0.04), 0 4px 8px -1px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 6px -2px rgba(0,0,0,0.03), 0 10px 20px -3px rgba(0,0,0,0.10);
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-full: 9999px;
      --duration-fast: 150ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --easing-out: cubic-bezier(0, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-family-zh);
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      line-height: var(--line-height-normal);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* State Switcher */
    .state-switcher {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #1F2937; color: #fff; padding: 8px 16px;
      display: flex; align-items: center; gap: 8px; font-size: 12px;
      font-family: var(--font-family-mono);
    }
    .state-switcher span { opacity: 0.7; }
    .state-switcher button {
      background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.2);
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
      font-family: var(--font-family-mono); transition: all 0.15s;
    }
    .state-switcher button:hover { background: rgba(255,255,255,0.25); }
    .state-switcher button.active { background: var(--color-primary); border-color: var(--color-primary); }
    body { padding-top: 40px; }

    .page-container { max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6); }

    /* HEADER (simplified) */
    .site-header {
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4) 0;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6);
    }
    .header-top {
      display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3);
    }
    .header-brand { display: flex; align-items: center; gap: var(--space-3); text-decoration: none; color: inherit; }
    .header-logo {
      width: 32px; height: 32px; background: var(--color-primary);
      border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
    }
    .header-logo svg { width: 18px; height: 18px; }
    .header-title { font-size: var(--font-size-lg); font-weight: var(--font-weight-bold); }

    /* Breadcrumb */
    .breadcrumb {
      display: flex; align-items: center; gap: var(--space-2);
      font-size: var(--font-size-sm); color: var(--color-text-secondary);
    }
    .breadcrumb a {
      color: var(--color-primary); text-decoration: none;
      transition: color var(--duration-fast);
    }
    .breadcrumb a:hover { color: var(--color-primary-hover); text-decoration: underline; }
    .breadcrumb a:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: 2px; }
    .breadcrumb-sep { color: var(--color-text-tertiary); }
    .breadcrumb-current { color: var(--color-text-primary); font-weight: var(--font-weight-medium); }

    /* STOCK INFO */
    .stock-hero {
      padding: var(--space-8) 0;
      opacity: 0; transform: translateY(16px);
    }
    .stock-hero.loaded { opacity: 1; transform: translateY(0); transition: opacity 0.5s var(--easing-out), transform 0.5s var(--easing-out); }
    .stock-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: var(--space-6); margin-bottom: var(--space-6); }
    .stock-identity { }
    .stock-code {
      font-family: var(--font-family-mono); font-size: var(--font-size-sm);
      color: var(--color-text-secondary); margin-bottom: var(--space-1);
    }
    .stock-name {
      font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-2);
    }
    .industry-badge {
      display: inline-flex; padding: var(--space-1) var(--space-3);
      font-size: var(--font-size-xs); font-weight: var(--font-weight-medium);
      border-radius: var(--radius-full);
      background: var(--color-primary-light); color: var(--color-primary);
    }

    .score-display { text-align: right; }
    .score-big {
      font-family: var(--font-family-en); font-size: var(--font-size-4xl);
      font-weight: var(--font-weight-bold); color: var(--color-accent-dark);
      line-height: 1;
    }
    .score-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-top: var(--space-1); }
    .score-bar-large {
      width: 160px; height: 8px; background: var(--color-bg-tertiary);
      border-radius: var(--radius-full); overflow: hidden; margin-top: var(--space-2);
    }
    .score-bar-fill-large {
      height: 100%; border-radius: var(--radius-full); background: var(--color-accent);
      transition: width var(--duration-slow) var(--easing-out);
    }
    .score-rank {
      font-size: var(--font-size-xs); color: var(--color-accent-dark);
      font-weight: var(--font-weight-medium); margin-top: var(--space-1);
    }

    /* Metric Cards */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .metric-card {
      background: var(--color-bg-secondary); border-radius: var(--radius-lg);
      padding: var(--space-5); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border);
      transition: transform var(--duration-normal) var(--easing-out), box-shadow var(--duration-normal) var(--easing-out);
    }
    .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .metric-value {
      font-family: var(--font-family-en); font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold); font-variant-numeric: tabular-nums;
      margin-bottom: var(--space-1);
    }
    .metric-value.primary { color: var(--color-primary); }
    .metric-value.accent { color: var(--color-accent-dark); }
    .metric-label {
      font-size: var(--font-size-sm); color: var(--color-text-secondary);
    }

    /* HISTORY TABLE */
    .section-title {
      font-size: var(--font-size-xl); font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-2);
    }
    .section-title::before {
      content: ''; display: inline-block; width: 4px; height: 20px;
      background: var(--color-primary); border-radius: 2px;
    }

    .table-wrapper {
      background: var(--color-bg-secondary); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); border: 1px solid var(--color-border);
      overflow: hidden; margin-bottom: var(--space-8);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead { background: var(--color-bg-tertiary); }
    th {
      padding: var(--space-3) var(--space-4); font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold); color: var(--color-text-secondary);
      text-align: left; text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--color-border); white-space: nowrap;
    }
    th.text-right { text-align: right; }
    td {
      padding: var(--space-3) var(--space-4); font-size: var(--font-size-sm);
      color: var(--color-text-primary); border-bottom: 1px solid var(--color-border);
    }
    td.text-right {
      text-align: right; font-family: var(--font-family-en); font-variant-numeric: tabular-nums;
    }
    tbody tr { transition: background var(--duration-fast) var(--easing-out); }
    tbody tr:hover { background: var(--color-bg-hover); }
    tbody tr:last-child td { border-bottom: none; }

    /* CHART */
    .chart-section { margin-bottom: var(--space-8); }
    .chart-container {
      background: var(--color-bg-secondary); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); border: 1px solid var(--color-border);
      padding: var(--space-6);
    }
    .chart-bar-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) 0; border-bottom: 1px solid var(--color-bg-tertiary);
    }
    .chart-bar-row:last-child { border-bottom: none; }
    .chart-year {
      width: 48px; font-family: var(--font-family-en); font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium); color: var(--color-text-secondary);
      flex-shrink: 0;
    }
    .chart-bar-bg {
      flex: 1; height: 24px; background: var(--color-bg-tertiary);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .chart-bar-fill {
      height: 100%; border-radius: var(--radius-sm);
      background: linear-gradient(90deg, var(--color-primary-light), var(--color-primary));
      transition: width 0.6s var(--easing-out);
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: var(--space-2);
    }
    .chart-bar-value {
      font-family: var(--font-family-en); font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold); color: var(--color-text-inverse);
      white-space: nowrap;
    }
    .chart-amount {
      width: 80px; font-family: var(--font-family-en); font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium); color: var(--color-text-primary);
      text-align: right; flex-shrink: 0;
    }

    /* BACK BUTTON */
    .back-section { padding-bottom: var(--space-8); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-6); font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium); font-family: var(--font-family-zh);
      border: none; border-radius: var(--radius-md); cursor: pointer;
      transition: all var(--duration-normal) var(--easing-out);
      outline: none; text-decoration: none;
    }
    .btn:focus-visible { box-shadow: 0 0 0 3px rgba(26,115,232,0.3); }
    .btn-secondary {
      background: var(--color-bg-secondary); color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-bg-tertiary); border-color: var(--color-border-hover); }

    /* NOT FOUND */
    .not-found {
      text-align: center; padding: var(--space-16) var(--space-8);
    }
    .not-found svg { width: 100px; height: 100px; color: var(--color-text-tertiary); opacity: 0.4; margin-bottom: var(--space-6); }
    .not-found h2 { font-size: var(--font-size-2xl); margin-bottom: var(--space-3); }
    .not-found p { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--space-6); }

    /* SKELETON */
    .skeleton { background: linear-gradient(90deg, var(--color-bg-tertiary) 25%, #E2E8F0 50%, var(--color-bg-tertiary) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-block { height: 200px; border-radius: var(--radius-lg); margin-bottom: var(--space-6); }
    .skeleton-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--space-4); margin-bottom: var(--space-8); }
    .skeleton-card { height: 100px; border-radius: var(--radius-lg); }

    /* FOOTER */
    .site-footer {
      background: var(--color-bg-tertiary); border-top: 1px solid var(--color-border);
      padding: var(--space-8) 0;
    }
    .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6); text-align: center; }
    .footer-disclaimer { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: var(--space-3); }
    .footer-copy { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }

    /* ANIMATIONS */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* RESPONSIVE */
    @media (max-width: 1024px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 767px) {
      .metrics-grid { grid-template-columns: 1fr; }
      .stock-header { flex-direction: column; }
      .score-display { text-align: left; }
      .skeleton-cards { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>

function generateHistory(stock) {
  const years = Math.min(stock.consecutiveYears, 10);
  const history = [];
  let dps = stock.dps;
  let yieldVal = stock.dividendYield;
  for (let i = 0; i < years; i++) {
    const year = String(2024 - i);
    const factor = i === 0 ? 1 : (0.90 + Math.random() * 0.05);
    if (i > 0) { dps = dps * factor; yieldVal = yieldVal * factor; }
    const dpsRound = Math.round(dps * 100) / 100;
    const totalAmount = Math.round(dpsRound * (stock.totalDividend / stock.dps) / years * 100) / 100;
    history.push({
      year: year,
      plan: "每10股派" + (dpsRound * 10).toFixed(2) + "元",
      dps: dpsRound,
      yield: Math.round(yieldVal * 100) / 100,
      exDate: year + "-07-" + String(5 + Math.floor(Math.random() * 20)).padStart(2, '0'),
      totalAmount: Math.round(totalAmount * 100) / 100
    });
  }
  return history;
}

function findStock(code) {
  if (DETAIL_DATA[code]) return DETAIL_DATA[code];
  const poolStock = STOCK_POOL.find(s => s.code === code);
  if (poolStock) {
    return { ...poolStock, history: generateHistory(poolStock) };
  }
  return null;
}

// ===== RENDER =====
function renderStock(stock) {
  document.title = stock.name + ' - 分红股排行榜';
  document.getElementById('breadcrumbName').textContent = stock.name;
  document.getElementById('stockCode').textContent = stock.code;
  document.getElementById('stockName').textContent = stock.name;
  document.getElementById('stockIndustry').textContent = stock.industry;
  document.getElementById('scoreValue').textContent = stock.score.toFixed(1);
  document.getElementById('scoreBar').style.width = stock.score + '%';
  document.getElementById('scoreRank').textContent = '综合排名第 ' + stock.comprehensiveRank + ' 名';
  document.getElementById('metricYears').textContent = stock.consecutiveYears + ' 年';
  document.getElementById('metricYield').textContent = stock.dividendYield.toFixed(2) + '%';
  document.getElementById('metricAvgYield').textContent = stock.avgYield3Y.toFixed(2) + '%';
  document.getElementById('metricTotal').textContent = stock.totalDividend.toFixed(2);

  // History table
  const tbody = document.getElementById('historyBody');
  tbody.innerHTML = stock.history.map(row =>
    '<tr>' +
    '<td>' + row.year + '</td>' +
    '<td>' + row.plan + '</td>' +
    '<td class="text-right">' + row.dps.toFixed(2) + '</td>' +
    '<td class="text-right">' + row.yield.toFixed(2) + '</td>' +
    '<td>' + row.exDate + '</td>' +
    '<td class="text-right">' + row.totalAmount.toFixed(2) + '</td>' +
    '</tr>'
  ).join('');

  // Chart
  const maxDps = Math.max(...stock.history.map(h => h.dps));
  const chartContainer = document.getElementById('chartContainer');
  chartContainer.innerHTML = stock.history.map(row => {
    const pct = Math.round((row.dps / maxDps) * 100);
    return '<div class="chart-bar-row">' +
      '<span class="chart-year">' + row.year + '</span>' +
      '<div class="chart-bar-bg"><div class="chart-bar-fill" style="width:' + pct + '%">' +
      (pct > 20 ? '<span class="chart-bar-value">' + row.dps.toFixed(2) + '</span>' : '') +
      '</div></div>' +
      '<span class="chart-amount">' + row.dps.toFixed(2) + ' 元</span>' +
      '</div>';
  }).join('');
}

function showNormal(stock) {
  document.getElementById('contentArea').style.display = '';
  document.getElementById('skeletonArea').style.display = 'none';
  document.getElementById('notFoundArea').style.display = 'none';
  renderStock(stock);
  setTimeout(() => document.getElementById('stockHero').classList.add('loaded'), 100);
}

function showLoading() {
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('skeletonArea').style.display = '';
  document.getElementById('notFoundArea').style.display = 'none';
}

function showNotFound() {
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('skeletonArea').style.display = 'none';
  document.getElementById('notFoundArea').style.display = '';
}

// ===== STATE SWITCHER =====
function switchState(state) {
  document.querySelectorAll('.state-switcher button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const code = new URLSearchParams(window.location.search).get('code') || '600519';
  const stock = findStock(code) || findStock('600519');

  switch(state) {
    case 'normal': showNormal(stock); break;
    case 'loading': showLoading(); break;
    case 'not-found': showNotFound(); break;
  }
}

// ===== INIT =====
function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code') || '600519';

  // Show loading first
  showLoading();

  // Simulate load delay
  setTimeout(() => {
    const stock = findStock(code);
    if (stock) {
      showNormal(stock);
    } else {
      showNotFound();
    }
  }, 500);
}
