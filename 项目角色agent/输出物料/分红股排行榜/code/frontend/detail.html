<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>股票详情 - 分红股排行榜</title>

  <!-- Instrument Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- HEADER (with breadcrumb) -->
<header class="site-header">
  <div class="header-inner" style="flex-direction:column;align-items:flex-start;">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
      <a href="/" class="header-brand">
        <div class="header-logo" style="width:28px;height:28px;" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" style="width:20px;height:20px;">
            <rect x="2" y="18" width="6" height="12" rx="1.5" fill="currentColor" opacity="0.4"/>
            <rect x="13" y="10" width="6" height="20" rx="1.5" fill="currentColor" opacity="0.7"/>
            <rect x="24" y="4" width="6" height="26" rx="1.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="header-title" style="font-size:var(--text-base);">分红股排行榜</span>
      </a>
    </div>
    <nav class="breadcrumb" aria-label="面包屑导航">
      <a href="/">首页</a>
      <span class="breadcrumb-sep" aria-hidden="true">&gt;</span>
      <span>股票详情</span>
      <span class="breadcrumb-sep" aria-hidden="true">&gt;</span>
      <span class="breadcrumb-current" id="breadcrumbName">--</span>
    </nav>
  </div>
</header>

<main>
  <!-- ===== Content (normal state) ===== -->
  <div id="contentArea" style="display:none;">

    <!-- Stock Hero Section -->
    <section class="stock-hero page-container" id="stockHero">
      <div class="stock-header">
        <!-- Stock Identity -->
        <div class="stock-identity">
          <div class="stock-code" id="stockCode">--</div>
          <h1 class="stock-name" id="stockName">--</h1>
          <span class="industry-badge" id="stockIndustry">--</span>
        </div>
        <!-- Score Display -->
        <div class="score-display">
          <div class="score-big" id="scoreValue">--</div>
          <div class="score-label">综合评分</div>
          <div class="score-bar-large">
            <div class="score-bar-fill-large" id="scoreBar" style="width:0%"></div>
          </div>
          <div class="score-rank" id="scoreRank">--</div>
        </div>
      </div>

      <!-- Metric Cards -->
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-value accent" id="metricYears">--</div>
          <div class="metric-label">连续分红年数</div>
        </div>
        <div class="metric-card">
          <div class="metric-value primary" id="metricYield">--</div>
          <div class="metric-label">最近年度股息率</div>
        </div>
        <div class="metric-card">
          <div class="metric-value primary" id="metricAvgYield">--</div>
          <div class="metric-label">近3年平均股息率</div>
        </div>
        <div class="metric-card">
          <div class="metric-value accent" id="metricTotal">--</div>
          <div class="metric-label">累计分红总额(亿元)</div>
        </div>
      </div>
    </section>

    <!-- ===== History Table ===== -->
    <section class="page-container">
      <h2 class="section-title">历年分红记录</h2>
      <div class="table-wrapper">
        <div class="table-scroll">
          <table aria-label="历年分红记录">
            <thead>
              <tr>
                <th scope="col">年度</th>
                <th scope="col">分红方案</th>
                <th scope="col" class="text-right">每股分红(元)</th>
                <th scope="col" class="text-right">股息率(%)</th>
                <th scope="col">除权除息日</th>
                <th scope="col" class="text-right">分红总额(亿元)</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ===== Dividend Bar Chart ===== -->
    <section class="chart-section page-container">
      <h2 class="section-title">每股分红趋势</h2>
      <div class="chart-container" id="chartContainer"></div>
    </section>

    <!-- ===== Price Chart Section ===== -->
    <section class="page-container" id="priceChartSection"></section>

    <!-- ===== Back Button ===== -->
    <section class="back-section page-container">
      <a href="/" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回排行榜
      </a>
    </section>
  </div>

  <!-- ===== Loading Skeleton ===== -->
  <div id="skeletonArea" style="display:none; padding-top: var(--space-8);" class="page-container">
    <div class="skeleton skeleton-block" style="height:120px;margin-top:var(--space-8);"></div>
    <div class="skeleton-cards">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div class="skeleton skeleton-block" style="height:300px;"></div>
  </div>

  <!-- ===== Not Found ===== -->
  <div id="notFoundArea" style="display:none;" class="page-container">
    <div class="not-found">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
        <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="2" stroke-dasharray="8 4"/>
        <path d="M35 60c0-8.284 6.716-15 15-15s15 6.716 15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="40" cy="42" r="3" fill="currentColor"/>
        <circle cx="60" cy="42" r="3" fill="currentColor"/>
      </svg>
      <h2>未找到该股票信息</h2>
      <p>请确认股票代码是否正确，或返回排行榜查看其他股票</p>
      <a href="/" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回排行榜
      </a>
    </div>
  </div>
</main>

<!-- FOOTER (simplified) -->
<footer class="site-footer" style="padding:var(--space-8) 0;">
  <div class="footer-inner simple">
    <p class="footer-disclaimer">本站数据仅供参考，不构成投资建议。投资有风险，入市需谨慎。</p>
    <p class="footer-copy">&copy; 2026 分红股排行榜</p>
  </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/detail.js"></script>
</body>
</html>
