services:
  postgres:
    image: postgres:16-alpine
    container_name: ziwei-pg
    environment:
      POSTGRES_USER: ziwei
      POSTGRES_PASSWORD: ziwei
      POSTGRES_DB: ziwei
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziwei"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: ziwei-api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

volumes:
  pg_data:
