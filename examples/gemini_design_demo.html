<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 知识库 - Landing Page</title>
<style>
  body {
    background-color: #0B1120;
    color: #F8FAFC;
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .hero-section {
    text-align: center;
    max-width: 800px;
    padding: 0 24px;
  }
  .badge {
    display: inline-block;
    padding: 6px 16px;
    background: rgba(59, 130, 246, 0.1);
    color: #3B82F6;
    border-radius: 20px;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 24px;
    border: 1px solid rgba(59, 130, 246, 0.2);
  }
  h1 {
    font-size: 3.5rem;
    font-weight: 700;
    margin: 0 0 24px 0;
    line-height: 1.2;
    background: linear-gradient(135deg, #FFFFFF 0%, #94A3B8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .ai-text {
    background: linear-gradient(to right, #3B82F6, #10B981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    color: #94A3B8;
    font-size: 1.25rem;
    line-height: 1.6;
    margin: 0 0 40px 0;
  }
  .cta-button {
    background-color: #3B82F6;
    color: #FFFFFF;
    border: none;
    padding: 16px 40px;
    font-size: 1.125rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
  }
  .cta-button:hover {
    background-color: #2563EB;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
  }
</style>
</head>
<body>

  <div class="hero-section">
    <div class="badge">✨ v2.0 核心引擎全新升级</div>
    <h1>下一代企业级 <span class="ai-text">AI 知识库</span></h1>
    <p>将海量碎片化信息转化为可计算的知识图谱。通过大语言模型赋予您的团队毫秒级的精准检索与深度洞察能力。</p>
    <button class="cta-button">免费开始构建</button>
  </div>

</body>
</html>
